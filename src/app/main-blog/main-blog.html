<div class="conteiner">
    @for (dados of dados; track dados.id){
       <div class="conteinerCard">
         <div class="blog-card">
            <div class="LettersDiv">
                    <p>{{dados.autor}}</p>
                <div class="TitleDiv">
                    <h1><a href="http://">{{dados.titulo}}</a></h1>
                </div>
                <div class="ImgDiv">
                    <h3> {{dados.Resumo}}</h3>
                    <p>{{dados.data}}</p>
                </div>
            </div>
            
        </div>
        <div class="ImageConteiner">
            <img [src]="dados.imgLink">
        </div>
       </div>
    }
    </div>
